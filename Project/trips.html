<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Baher Trips - الرحلات</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      font-family: 'Cairo', sans-serif;
      background: #f8fafc;
    }
  </style>
</head>

<body>

  <nav class="bg-white shadow-md sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <a href="index.html" class="text-3xl font-black text-blue-900">
        Baher Trips
      </a>
      <div class="flex gap-8 font-bold">
        <a href="index.html">الرئيسية</a>
        <a href="trips.html" class="text-cyan-600">الرحلات</a>
      </div>
    </div>
  </nav>

  <section class="relative h-[500px] overflow-hidden">
    <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=1600&auto=format&fit=crop"
         class="absolute inset-0 w-full h-full object-cover" alt="Hero Image">
    <div class="absolute inset-0 bg-black/50"></div>
    <div class="relative z-10 h-full flex items-center">
      <div class="max-w-7xl mx-auto px-6 text-white">
        <h1 class="text-6xl font-black mb-6">الرحلات السياحية</h1>
        <p class="text-2xl text-gray-200">أفضل عروض شرم الشيخ ودهب والغردقة والعين السخنة</p>
      </div>
    </div>
  </section>

  <section class="max-w-7xl mx-auto px-6 py-20">
    <div class="grid md:grid-cols-2 xl:grid-cols-3 gap-10" id="trips-container">
        <p class="text-center text-gray-500 col-span-full">جاري تحميل أحدث الرحلات...</p>
    </div>
  </section>

  <script>
    async function loadPopularFlights() {
    // نداء مباشر لملف الـ PHP على نفس السيرفر لمنع الكاش تماماً وحل الـ CORS
    const url = 'fetch_flights.php?_=' + new Date().getTime(); 

    try {
        const response = await fetch(url);
        if (!response.ok) {
            throw new Error('حدث خطأ أثناء جلب البيانات من السيرفر');
        }
        
        const data = await response.json();
        console.log(data);

        const tripsContainer = document.getElementById('trips-container');
        tripsContainer.innerHTML = '';

        if (data.success && data.data && data.data.length > 0) {
            
            data.data.forEach((flight) => {
                const affiliateLink = `https://www.aviasales.com/search?origin_iata=${flight.origin}&destination_iata=${flight.destination}&depart_date=${flight.depart_date}&with_request=true&marker=732094`; 

                const cityImage = `https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=600&q=80`;
                const dynamicRouteImage = `https://source.unsplash.com/featured/600x400/?travel,${flight.destination}`;

                const tripCard = `
                    <div class="bg-white rounded-xl shadow-lg overflow-hidden hover:shadow-xl transition-all duration-300 border border-gray-100 flex flex-col justify-between target-card">
                        <div class="relative h-48 w-full bg-gray-200 overflow-hidden">
                            <img src="${dynamicRouteImage}" 
                                 onerror="this.src='${cityImage}'" 
                                 class="w-full h-full object-cover hover:scale-105 transition-transform duration-500" 
                                 alt="رحلة إلى ${flight.destination}">
                            <div class="absolute top-3 left-3 bg-black/70 text-white text-xs px-2 py-1 rounded font-bold">
                                ✈️ عروض حية
                            </div>
                        </div>
                        <div class="p-6 flex-grow">
                            <div class="bg-blue-50 text-blue-900 font-bold px-3 py-1 rounded-full inline-block text-sm mb-4">
                                طيران من ${flight.origin}
                            </div>
                            <h3 class="text-xl font-bold text-gray-800 mb-2">وجهة الرحلة: <span class="text-cyan-600">${flight.destination}</span></h3>
                            <p class="text-gray-600 text-sm mb-1">📅 تاريخ المغادرة: ${flight.depart_date}</p>
                            <p class="text-gray-600 text-sm mb-4">🔄 عدد التوقفات: ${flight.number_of_changes === 0 ? 'مباشر' : flight.number_of_changes}</p>
                        </div>
                        <div class="border-t p-6 bg-gray-50 flex items-center justify-between">
                            <div>
                                <span class="text-sm text-gray-400 block">تبدأ من</span>
                                <span class="text-2xl font-black text-emerald-600">$${flight.value}</span>
                            </div>
                            <a href="${affiliateLink}" target="_blank" class="bg-cyan-600 hover:bg-cyan-700 text-white font-bold py-2.5 px-5 rounded-lg transition-colors duration-200 text-sm">
                                احجز الآن
                            </a>
                        </div>
                    </div>
                `;
                
                tripsContainer.innerHTML += tripCard;
            });
            
        } else {
            tripsContainer.innerHTML = '<p class="text-center text-gray-500 col-span-full">لا توجد رحلات متاحة حالياً، يرجى المحاولة لاحقاً.</p>';
        }

    } catch (error) {
        console.error('Error fetching flights:', error);
        document.getElementById('trips-container').innerHTML = '<p class="text-center text-red-500 col-span-full">عذراً، تعذر تحميل الرحلات الآن.</p>';
    }
}

document.addEventListener('DOMContentLoaded', loadPopularFlights);
  </script>
</body>

</html>
