<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>باهر للرحلات - العروض الحية</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans text-right">

    <nav class="bg-white shadow-md p-4">
        <div class="container mx-auto flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold text-cyan-600">Baher Trips</a>
            <a href="index.html" class="text-gray-600 hover:text-cyan-600 font-semibold">الرئيسية</a>
        </div>
    </nav>

    <div class="py-10 bg-cyan-600 text-white text-center">
        <h1 class="text-4xl font-extrabold mb-2">أحدث عروض الطيران الحية</h1>
        <p class="text-cyan-100">أسعار حقيقية ومحدثة تلقائياً من السيرفر</p>
    </div>

    <div class="container mx-auto px-4 py-12">
        <div id="trips-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </div>

    <script>
    async function loadPopularFlights() {
        const tripsContainer = document.getElementById('trips-container');
        tripsContainer.innerHTML = '<p class="text-center text-gray-500 col-span-full">جاري جلب أحدث العروض الحية من السيرفر الخاص...</p>';
        
        let allFlights = [];
        
        // بيكلم السيرفر بتاعنا احنا مباشرة بدون corsproxy
        for (let page = 1; page <= 3; page++) {
            const url = `/api/flights?page=${page}`;
            
            try {
                const response = await fetch(url);
                if (response.ok) {
                    const data = await response.json();
                    if (data.success && data.data && data.data.length > 0) {
                        allFlights = allFlights.concat(data.data);
                    }
                }
            } catch (error) {
                console.error(`Error fetching page ${page}:`, error);
            }
        }

        tripsContainer.innerHTML = '';

        if (allFlights.length > 0) {
            allFlights.forEach((flight) => {
                const affiliateLink = `https://www.aviasales.com/search?origin_iata=${flight.origin}&destination_iata=${flight.destination}&depart_date=${flight.depart_date}&with_request=true&marker=732094`; 
                const cityImage = `https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=600&q=80`;
                const dynamicRouteImage = `https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?auto=format&fit=crop&w=600&q=80`;

                const tripCard = `
                    <div class="bg-white rounded-xl shadow-lg overflow-hidden hover:shadow-xl transition-all duration-300 border border-gray-100 flex flex-col justify-between">
                        <div class="relative h-48 w-full bg-gray-200 overflow-hidden">
                            <img src="${dynamicRouteImage}" onerror="this.src='${cityImage}'" class="w-full h-full object-cover hover:scale-105 transition-transform duration-500" alt="رحلة إلى ${flight.destination}">
                            <div class="absolute top-3 left-3 bg-black/70 text-white text-xs px-2 py-1 rounded font-bold">✈️ عروض حية</div>
                        </div>
                        <div class="p-6 flex-grow">
                            <div class="bg-blue-50 text-blue-900 font-bold px-3 py-1 rounded-full inline-block text-sm mb-4">طيران من ${flight.origin}</div>
                            <h3 class="text-xl font-bold text-gray-800 mb-2">وجهة الرحلة: <span class="text-cyan-600">${flight.destination}</span></h3>
                            <p class="text-gray-600 text-sm mb-1">📅 تاريخ المغادرة: ${flight.depart_date}</p>
                            <p class="text-gray-600 text-sm mb-4">🔄 عدد التوقفات: ${flight.number_of_changes === 0 ? 'مباشر' : flight.number_of_changes}</p>
                        </div>
                        <div class="border-t p-6 bg-gray-50 flex items-center justify-between">
                            <div>
                                <span class="text-sm text-gray-400 block">تبدأ من</span>
                                <span class="text-2xl font-black text-emerald-600">$${flight.value}</span>
                            </div>
                            <a href="${affiliateLink}" target="_blank" class="bg-cyan-600 hover:bg-cyan-700 text-white font-bold py-2.5 px-5 rounded-lg transition-colors duration-200 text-sm">احجز الآن</a>
                        </div>
                    </div>
                `;
                tripsContainer.innerHTML += tripCard;
            });
        } else {
            tripsContainer.innerHTML = '<p class="text-center text-gray-500 col-span-full">لا توجد رحلات متاحة حالياً، يرجى المحاولة لاحقاً.</p>';
        }
    }
    document.addEventListener('DOMContentLoaded', loadPopularFlights);
    </script>
</body>
</html>
